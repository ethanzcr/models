<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的名字 | 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* 头部区域 */
        header {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #f0f0f0;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #2c3e50;
            font-size: 2.2rem;
            margin-bottom: 5px;
        }
        
        .title {
            color: #4285f4;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        
        .location {
            color: #666;
            margin-bottom: 20px;
        }
        
        /* 社交链接 */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .social-link {
            display: inline-block;
            padding: 8px 15px;
            background: #f0f0f0;
            border-radius: 5px;
            text-decoration: none;
            color: #555;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .social-link:hover {
            background: #4285f4;
            color: white;
        }
        
        /* 内容区块 */
        .section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        
        h2 {
            color: #2c3e50;
            border-left: 4px solid #4285f4;
            padding-left: 10px;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        /* 列表样式 */
        ul {
            padding-left: 20px;
        }
        
        li {
            margin-bottom: 10px;
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            margin-top: 30px;
        }
        
        /* 简约卡片样式 */
        .simple-card {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        
        .simple-card:last-child {
            border-bottom: none;
        }
        
        .simple-card h3 {
            color: #4285f4;
            margin-bottom: 5px;
        }
        
        .simple-card .meta {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            
            header, .section {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <img src="https://via.placeholder.com/150" alt="个人照片" class="profile-img">
            <h1>朱晨睿</h1>
            <p class="title">学生</p>
            <p class="location">海南大学</p>
            <p>一个简单的个人主页，记录我的学习与成长</p>
            
            <div class="social-links">
                <a href="mailto:your.email@example.com" class="social-link">📧 邮箱</a>
                <a href="https://github.com/yourusername" class="social-link" target="_blank">💻 GitHub</a>
                <a href="#" class="social-link">📚 博客</a>
            </div>
        </header>
        
        <!-- 关于我 -->
        <section class="section">
            <h2>👤 关于我</h2>
            <p>你好！我是朱晨睿，目前在[学校/公司名称]学习/工作。</p>
            <p>我对[你的兴趣领域]很感兴趣，正在学习相关知识。</p>
            <p>希望在这个领域不断学习进步，结交志同道合的朋友。</p>
        </section>
        
        <!-- 教育背景 -->
        <section class="section">
            <h2>🎓 教育背景</h2>
            <div class="simple-card">
                <h3>海南大学</h3>
                <p class="meta">2022年 - 至今 | 软件工程</p>
                <p>在这里学习专业知识，参与感兴趣的课程和项目。</p>
            </div>
            
            <div class="simple-card">
                <h3>另一所学校（可选）</h3>
                <p class="meta">2018年 - 2022年 | 专业名称</p>
                <p>本科学习阶段，打下基础知识。</p>
            </div>
        </section>
        
        <!-- 学习/项目 -->
        <section class="section">
            <h2>📁 学习项目</h2>
            <div class="simple-card"
